spring:
  application:
    name: apiwatch
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apiwatch}
    username: ${SPRING_DATASOURCE_USERNAME:apiwatch}
    password: ${SPRING_DATASOURCE_PASSWORD:apiwatch}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

apiwatch:
  scheduler:
    enabled: ${APIWATCH_SCHEDULER_ENABLED:true}
    interval-ms: ${APIWATCH_SCHEDULER_INTERVAL_MS:5000}
    initial-delay-ms: ${APIWATCH_SCHEDULER_INITIAL_DELAY_MS:15000}
    worker-pool-size: ${APIWATCH_SCHEDULER_WORKER_POOL_SIZE:4}
    queue-capacity: ${APIWATCH_SCHEDULER_QUEUE_CAPACITY:100}
    lease-seconds: ${APIWATCH_SCHEDULER_LEASE_SECONDS:120}
    instance-id: ${APIWATCH_SCHEDULER_INSTANCE_ID:}
  retention:
    enabled: ${APIWATCH_RETENTION_ENABLED:true}
    health-check-days: ${APIWATCH_RETENTION_HEALTH_CHECK_DAYS:90}
    incident-days: ${APIWATCH_RETENTION_INCIDENT_DAYS:365}
    notification-days: ${APIWATCH_RETENTION_NOTIFICATION_DAYS:90}
    cron: ${APIWATCH_RETENTION_CRON:0 30 2 * * *}
  notifications:
    initial-delay-ms: ${APIWATCH_NOTIFICATIONS_INITIAL_DELAY_MS:5000}
    delivery-interval-ms: ${APIWATCH_NOTIFICATIONS_DELIVERY_INTERVAL_MS:5000}
    max-attempts: ${APIWATCH_NOTIFICATIONS_MAX_ATTEMPTS:3}
    retry-delay-seconds: ${APIWATCH_NOTIFICATIONS_RETRY_DELAY_SECONDS:60}
    email-from: ${APIWATCH_NOTIFICATIONS_EMAIL_FROM:apiwatch@localhost}
  frontend-origin: ${APIWATCH_FRONTEND_ORIGIN:http://localhost:5173}
  secrets:
    encryption-key: ${APIWATCH_ENCRYPTION_KEY:YXBpd2F0Y2gtZGV2LWVuY3J5cHRpb24ta2V5LTMyYiE=}
  auth:
    admin:
      username: ${APIWATCH_ADMIN_USERNAME:admin}
      password: ${APIWATCH_ADMIN_PASSWORD:admin-change-me}
    viewer:
      username: ${APIWATCH_VIEWER_USERNAME:viewer}
      password: ${APIWATCH_VIEWER_PASSWORD:viewer-change-me}
  security:
    block-private-targets: ${APIWATCH_BLOCK_PRIVATE_TARGETS:true}
    private-target-allowlist: ${APIWATCH_PRIVATE_TARGET_ALLOWLIST:}
  demo-data:
    enabled: ${APIWATCH_DEMO_DATA_ENABLED:false}
    base-url: ${APIWATCH_DEMO_BASE_URL:http://localhost:8080}

logging:
  level:
    com.hasan.apiwatch: INFO
