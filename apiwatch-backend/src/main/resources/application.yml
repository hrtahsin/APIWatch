spring:
  application:
    name: apiwatch
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apiwatch}
    username: ${SPRING_DATASOURCE_USERNAME:apiwatch}
    password: ${SPRING_DATASOURCE_PASSWORD:apiwatch}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

apiwatch:
  scheduler:
    enabled: ${APIWATCH_SCHEDULER_ENABLED:true}
    interval-ms: ${APIWATCH_SCHEDULER_INTERVAL_MS:60000}
    initial-delay-ms: ${APIWATCH_SCHEDULER_INITIAL_DELAY_MS:15000}
  frontend-origin: ${APIWATCH_FRONTEND_ORIGIN:http://localhost:5173}
  secrets:
    encryption-key: ${APIWATCH_ENCRYPTION_KEY:YXBpd2F0Y2gtZGV2LWVuY3J5cHRpb24ta2V5LTMyYiE=}
  demo-data:
    enabled: ${APIWATCH_DEMO_DATA_ENABLED:false}
    base-url: ${APIWATCH_DEMO_BASE_URL:http://localhost:8080}

logging:
  level:
    com.hasan.apiwatch: INFO
